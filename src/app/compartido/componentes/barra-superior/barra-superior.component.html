<header class="barra-superior">
  <div class="barra-superior__intro">
    <p class="etiqueta">Sistema web profesional</p>
    <h2>Control total del gimnasio</h2>
    <span>Recepcion, ventas, asistencia y analitica en una sola vista.</span>
  </div>

  <div class="acciones">
    <label class="busqueda">
      <span class="busqueda__icono" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M21 21L16.65 16.65" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <input type="text" placeholder="Buscar cliente o pago" />
    </label>

    <div class="acciones__rapidas">
      <button type="button">Nuevo ingreso</button>
      <button type="button" class="acciones__rapidas--secundario">Cobro rapido</button>
    </div>

    <div class="usuario">
      <div class="usuario__avatar"></div>
      <div>
        <strong>Jack Supervisor</strong>
        <span>Administrador</span>
      </div>
    </div>
  </div>
</header>
